services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_USER:     postgres
      DB_PASSWORD: postgres
      DB_HOST:     db          # swap with your RDS endpoint later
      DB_PORT:     5432
      DB_NAME:     notesdb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Local Postgres (remove this service when switching to RDS) ──────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       notesdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
